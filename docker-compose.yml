services:
  # Base de Datos para Productos
  products-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: products-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "${PRODUCTS_DB_PORT}:1433" 
    volumes:
      - products_data:/var/opt/mssql 
      - ./sql-scripts:/sql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD}", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Base de Datos para Transacciones
  transactions-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: transactions-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "${TRANSACTIONS_DB_PORT}:1433" 
    volumes:
      - transactions_data:/var/opt/mssql 
      - ./sql-scripts:/sql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD}", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Microservicio de Productos
  inventory.products.api:
    image: ${DOCKER_REGISTRY-}inventoryproductsapi
    build:
      context: .
      dockerfile: Inventory.Products.Api/Dockerfile
    depends_on:
      products-db:
        condition: service_healthy
    environment:
      - DB_CONNECTION=Server=products-db;Database=${PRODUCTS_DB_NAME};User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
    volumes:
      - products_images:/app/wwwroot/images 

  # Microservicio de Transacciones
  inventory.transactions.api:
    image: ${DOCKER_REGISTRY-}inventorytransactionsapi
    build:
      context: .
      dockerfile: Inventory.Transactions.Api/Dockerfile
    depends_on:
      transactions-db:
        condition: service_healthy
    environment:
      - DB_CONNECTION=Server=transactions-db;Database=${TRANSACTIONS_DB_NAME};User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;

  # Frontend React
  inventory-frontend:
    image: ${DOCKER_REGISTRY-}inventoryfrontend
    build:
      context: ./inventory.frontend.react
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - inventory.products.api
      - inventory.transactions.api

volumes:
  products_data:
  transactions_data:
  products_images:
