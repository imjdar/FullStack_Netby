server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: Todas las rutas del frontend caen al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse Proxy: Redirige llamadas API de Productos al microservicio interno
    location /api/products {
        proxy_pass http://inventory.products.api:8080/api/products;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse Proxy: Redirige llamadas de Products update-stock
    location /api/Products {
        proxy_pass http://inventory.products.api:8080/api/Products;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse Proxy: Redirige llamadas API de Transacciones al microservicio interno
    location /api/transactions {
        proxy_pass http://inventory.transactions.api:8080/api/transactions;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para servir imágenes estáticas desde Products API
    location /images/ {
        proxy_pass http://inventory.products.api:8080/images/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy para Scalar/OpenAPI de Productos (desarrollo)
    location /scalar/products/ {
        proxy_pass http://inventory.products.api:8080/scalar/v1;
        proxy_http_version 1.1;
    }

    # Proxy para Scalar/OpenAPI de Transacciones (desarrollo)
    location /scalar/transactions/ {
        proxy_pass http://inventory.transactions.api:8080/scalar/v1;
        proxy_http_version 1.1;
    }
}
